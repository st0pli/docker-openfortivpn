name: Build latest based image

on:
  schedule:
    # 每天 UTC 0 点运行（可根据需要调整）
    - cron: '0 0 * * *'
  workflow_dispatch:      # 允许手动触发

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      BASE_IMAGE: alpine:latest
      TARGET_IMAGE: st0p/openfortivpn:latest
      CACHE_KEY: latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 拉取基础镜像并获取其摘要
      - name: Pull base image and get digest
        id: base_digest
        run: |
          docker pull ${{ env.BASE_IMAGE }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.BASE_IMAGE }} | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      # 尝试恢复上一次构建时保存的摘要缓存
      - name: Restore cached base digest
        id: cache
        uses: actions/cache@v4
        with:
          path: base_digest_${{ env.CACHE_KEY }}.txt
          key: base-digest-${{ env.CACHE_KEY }}-${{ github.run_id }}
          restore-keys: |
            base-digest-${{ env.CACHE_KEY }}-

      # 比较当前摘要与缓存中的摘要
      - name: Check if base image changed
        id: check
        run: |
          CACHED_DIGEST=""
          if [ -f base_digest_${{ env.CACHE_KEY }}.txt ]; then
            CACHED_DIGEST=$(cat base_digest_${{ env.CACHE_KEY }}.txt)
          fi
          CURRENT_DIGEST="${{ steps.base_digest.outputs.digest }}"
          echo "Cached digest: $CACHED_DIGEST"
          echo "Current digest: $CURRENT_DIGEST"
          if [ "$CACHED_DIGEST" != "$CURRENT_DIGEST" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 仅在基础镜像发生变化时构建并推送
      - name: Build and push multi-arch image
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.TARGET_IMAGE }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 更新缓存文件（仅当构建发生时）
      - name: Update cached digest
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.base_digest.outputs.digest }}" > base_digest_${{ env.CACHE_KEY }}.txt

      # 保存缓存（仅在构建后执行，以确保下次能恢复新摘要）
      - name: Save cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: base_digest_${{ env.CACHE_KEY }}.txt
          key: base-digest-${{ env.CACHE_KEY }}-${{ github.run_id }}
